name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: akashshetty1997
          outputs: |
            dist/github-snake.svg?color_snake=#F85D7F&color_dots=#1F222E,#F8D866,#F85D7F,#F75C7E,#FFFFFF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#F85D7F&color_dots=#1F222E,#F8D866,#F85D7F,#F75C7E,#FFFFFF

      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}